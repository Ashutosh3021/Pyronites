
services:
  pyrocore:
    build: .
    container_name: pyrocore-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Named volume for persistent data: db file, storage, backups survive container recreation
      - pyrocore-data:/data

volumes:
  pyrocore-data:
    name: pyrocore-data
